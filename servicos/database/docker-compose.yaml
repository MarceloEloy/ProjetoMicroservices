services:
  db:
    image: postgres:14.22
    restart: always
    container_name: microprojeto
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_MULTIPLE_DATABASES: microclientes, micropedidos, microprodutos
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: