services:
  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docs:/data
    environment:
      MINIO_ROOT_USER: ${CHAVE_MINIO_USER}
      MINIO_ROOT_PASSWORD: ${CHAVE_MINIO_SECRET}
    command: server /data --console-address ":9001"
    restart: unless-stopped