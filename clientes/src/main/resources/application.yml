spring:
  application:
    name: clientes
  datasource:
    url: jdbc:postgresql://localhost:5555/microclientes
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
jpa:
  database-platform: org.hibernate.dialect.PostgreSQLDialect
  hibernate:
    ddl-auto: none
    show-sql: true
  properties:
    hibernate:
      format-sql: true
server:
  port: 8082
